name: Build

on:
  push:
    branches: [ main ]
  schedule:
    - cron:  '00 13 * * *'

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: npm ci
      - run: npm run fetchEvents
      - run: npm run build
      - name: Commit events-data.js
        run: |
          git status
          git config --global user.name 'Newwwie Bot'
          git config --global user.email 'buildbot@newwwie.com'
          git add src/js/events/events-data.js
          git add dist
          git commit -m "Get latest set of Meetup events"
          git push
  test:
    needs: "build"
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 20.x
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npm run test
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30